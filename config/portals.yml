# Raven job discovery filters
# Copy from config/portals.example.yml for full options.

title_filter:
  positive:
    - "software engineer"
    - "developer"
  negative:
    - "senior director"
    - "intern"

location_filter:
  allow:
    - "Remote"
    - "United States"
  block: []

job_boards:
  - name: RemoteOK
    provider: remoteok
    enabled: true
  - name: Remotive
    provider: remotive
    enabled: true
  - name: Arbeitnow
    provider: arbeitnow
    enabled: true
  - name: Landing.jobs
    provider: landingjobs
    enabled: true
